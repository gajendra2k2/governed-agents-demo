# Identity → tier policy. The MCP server enforces this; the model never sees it.
# Identity arrives in the HTTP request header `x-agent-identity` — it cannot be
# set, forged, or even read by the LLM.
#
# Tier semantics (also encoded per-tool below):
#   1 = read
#   2 = low-risk write (logged + executed)
#   3 = irreversible critical write (out of scope for any agent — humans only)
#   4 = high-value write (defaults to shadow mode — simulated + logged)
#   5 = financial write (requires human approval)

identities:
  viewer:
    description: "Read-only analyst."
    allowed_tiers: [1]
  fraud_investigator:
    description: "Agent role for fraud investigation. Can read, flag, and request refunds; CANNOT freeze or cancel directly."
    allowed_tiers: [1, 2, 5]
  ops_human:
    description: "Operator role — full authority. Used by the human in the loop, not by agents."
    allowed_tiers: [1, 2, 3, 4, 5]

tools:
  list_recent_orders:        { tier: 1 }
  get_order_details:         { tier: 1 }
  assess_fraud_risk:         { tier: 1, multi_model: true }
  flag_order_for_review:     { tier: 2 }
  freeze_customer_account:   { tier: 3 }
  cancel_order:              { tier: 4, shadow_by_default: true }
  issue_refund:              { tier: 5, approval_required: true }
